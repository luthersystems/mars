name: CI Build

on:
  pull_request:
    branches:
      - main
jobs:
  build:
    name: ${{ matrix.image }} - ${{ matrix.arch }} docker build
    runs-on: ${{ fromJSON('{"arm64":"2vcpu-ubuntu-2204-arm","amd64":"ubuntu-22.04"}')[matrix.arch] }}
    strategy:
      matrix:
        arch:
          - amd64
          - arm64
        image:
          - mars
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0 # include tags for VERSION detection
      - name: Build container
        uses: ./.github/actions/build-docker-images
        with:
          arch: ${{ matrix.arch }}
          image: .
          git_rev: $GITHUB_SHA
      - name: Verify terraform provider cache
        if: matrix.image == 'mars'
        shell: bash
        run: ./scripts/smoke-tf-cache.sh "luthersystems/mars:${GITHUB_SHA}"
      - name: Verify insideout-preflight binary
        if: matrix.image == 'mars'
        shell: bash
        run: ./scripts/smoke-preflight.sh "luthersystems/mars:${GITHUB_SHA}"
