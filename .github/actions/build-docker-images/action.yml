name: Build Docker Images
description: A custom action to build Docker images for specified platforms and images
inputs:
  arch:
    description: The platform architecture
    required: true
  image:
    description: The image to build
    required: true
  git_tag:
    description: Git release tag
    default: ""
  git_rev:
    description: Git commit hash
    default: ""

runs:
  using: composite
  steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Install Docker (ARM runners)
      if: runner.arch == 'ARM64'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ca-certificates curl gnupg make
        sudo install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        sudo chmod a+r /etc/apt/keyrings/docker.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
        sudo apt-get update
        sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin
        sudo chmod 666 /var/run/docker.sock

    - name: Configure DockerHub
      uses: ./.github/actions/configure-dockerhub

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        platforms: linux/${{ inputs.arch }}

    # The mars image bakes terraform + providers + awscli + ansible
    # collections into one layer; on the standard hosted ubuntu runner
    # (~14 GB free) that intermittently hits "no space left on device"
    # mid-bake (e.g. luthersystems/mars#175). Reclaim the preinstalled
    # toolchains the build never uses (~20-30 GB on hosted runners).
    # Guarded with `|| true` so it's a harmless no-op on the self-hosted
    # arm runner, where these paths don't exist.
    - name: Free up disk space
      shell: bash
      run: |
        echo "disk before:"; df -h / | tail -1
        sudo rm -rf \
          /usr/local/lib/android \
          /usr/share/dotnet \
          /opt/ghc \
          /usr/local/.ghcup \
          /usr/local/share/boost \
          /opt/hostedtoolcache/CodeQL 2>/dev/null || true
        echo "disk after:"; df -h / | tail -1

    - name: Build docker image for ${{ inputs.arch }}
      shell: bash
      run: |
        TARGET=""
        if [[ -n "${{ inputs.git_tag }}" ]]; then
          TARGET="push"
        fi
        cd ${{ inputs.image }} && make ARCH=${{ inputs.arch }} TAG_SUFFIX=-${{ inputs.arch }} GIT_TAG=${{ inputs.git_tag }} GIT_REVISION=${{ inputs.git_rev }} $TARGET
